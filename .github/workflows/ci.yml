name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install root dependencies
      run: npm ci

    - name: Install backend dependencies
      run: npm ci --prefix backend

    - name: Install frontend dependencies
      run: npm ci --prefix frontend

    - name: Run linting
      run: npx eslint .

    - name: Run tests
      run: npm run test

    - name: Build frontend
      run: npm run build --prefix frontend

  deploy-staging:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Deploy to Staging (Placeholder)
      run: echo "Deploying to Vercel/Render Staging environment..."

  deploy-production:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Deploy to Production (Placeholder)
      run: echo "Deploying to Vercel/Render Production environment..."

  rollback:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
    - name: Rollback to previous deployment (Placeholder)
      run: echo "Initiating rollback procedure via CI/CD..."
