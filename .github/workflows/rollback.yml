name: Instant Rollback

on:
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'The Git commit SHA to rollback to'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Perform Rollback
        env:
          TARGET_COMMIT: ${{ inputs.target_commit }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git read-tree -um HEAD $TARGET_COMMIT
          git commit -m "Rollback to $TARGET_COMMIT"
          git push origin HEAD:${{ github.ref_name }}
