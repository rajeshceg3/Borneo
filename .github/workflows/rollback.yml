name: Rollback

on:
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'The commit SHA to rollback to'
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Perform rollback
      env:
        TARGET_COMMIT: ${{ inputs.target_commit }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Read the target commit's tree into the index
        git read-tree -um HEAD $TARGET_COMMIT

        # Create a new commit from the current index state
        git commit -m "Rollback to $TARGET_COMMIT"

        # Push the detached HEAD to the current branch to avoid rewriting history
        git push origin HEAD:${{ github.ref_name }}
