name: Rollback

on:
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'Target commit hash to rollback to'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for rollback

      - name: Perform Rollback
        env:
          TARGET_COMMIT: ${{ inputs.target_commit }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Revert the tree to the target commit
          git read-tree -u --reset $TARGET_COMMIT

          # Create a new commit with the state of the target commit
          git commit -m "chore: rollback to $TARGET_COMMIT"

          # Push the new commit to the current branch
          git push origin HEAD:${{ github.ref_name }}
