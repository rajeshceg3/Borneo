name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'The commit hash to rollback to'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Perform Rollback
        env:
          TARGET_COMMIT: ${{ inputs.target_commit }}
        run: |
          echo "Rolling back to commit: $TARGET_COMMIT"

          # Ensure target commit exists
          if ! git cat-file -t "$TARGET_COMMIT" > /dev/null 2>&1; then
            echo "Error: Target commit $TARGET_COMMIT does not exist."
            exit 1
          fi

          # Use git read-tree to revert the tree to the target commit state
          git read-tree -um HEAD "$TARGET_COMMIT"

          # Create a new commit with the state of the target commit
          git commit -m "Rollback to $TARGET_COMMIT"

          # Push the detached HEAD to the current branch to avoid rewriting history
          git push origin HEAD:${{ github.ref_name }}
