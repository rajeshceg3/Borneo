name: Rollback

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'The commit SHA to rollback to'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

      - name: Perform Rollback
        env:
          TARGET_COMMIT: ${{ inputs.commit_sha }}
        run: |
          # Use git read-tree to revert the tree to the target commit state
          git read-tree -um HEAD $TARGET_COMMIT

          # Create a new commit with the rolled-back state
          git commit -m "Rollback to $TARGET_COMMIT"

          # Push the detached HEAD
          git push origin HEAD:${{ github.ref_name }}
