name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'The Git commit SHA to rollback to'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history to reset

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Perform Rollback
        env:
          TARGET_COMMIT: ${{ github.event.inputs.target_commit }}
        run: |
          # Verify the target commit exists
          if ! git cat-file -e "$TARGET_COMMIT^{commit}"; then
            echo "Error: Target commit $TARGET_COMMIT does not exist."
            exit 1
          fi

          # We use git read-tree to make the working directory and index exactly match
          # the target commit, then commit that state. This creates a new commit
          # that effectively reverts all changes since the target commit, without
          # altering the git history.

          git read-tree -um HEAD "$TARGET_COMMIT"

          COMMIT_MSG="chore: Rollback to $TARGET_COMMIT"
          git commit -m "$COMMIT_MSG"

          # Push the new commit to the current branch
          git push origin HEAD:${{ github.ref_name }}

      - name: Notify Status
        if: always()
        run: |
          echo "Rollback workflow completed."
