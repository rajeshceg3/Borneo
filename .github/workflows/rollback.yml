name: Rollback

on:
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'The commit SHA to rollback to'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for all tags and branches

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rollback to target commit
        env:
          TARGET_COMMIT: ${{ inputs.target_commit }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          echo "Rolling back to commit: $TARGET_COMMIT"

          # Use git read-tree to revert the tree to the target commit state
          git read-tree -um HEAD $TARGET_COMMIT

          # Create a new commit with the state of the target commit
          git commit -m "Rollback to $TARGET_COMMIT"

          # Push the detached HEAD to the current branch to avoid rewriting history
          git push origin HEAD:$REF_NAME
