name: Instant Rollback

on:
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'Target commit hash to rollback to'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Perform Rollback
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Use git read-tree to revert to the target commit state
          git read-tree -um @ ${{ inputs.target_commit }}

          # Commit the changes
          git commit -m "Rollback to ${{ inputs.target_commit }}"

          # Push the detached HEAD to the current branch
          git push origin HEAD:${{ github.ref_name }}
