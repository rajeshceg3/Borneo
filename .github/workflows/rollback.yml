name: Rollback Workflow

on:
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'The commit SHA to rollback to'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "actions@github.com"

      - name: Perform Rollback
        env:
          TARGET_COMMIT: ${{ inputs.target_commit }}
        run: |
          git read-tree -u --reset $TARGET_COMMIT
          git commit -m "Rollback to commit $TARGET_COMMIT"
          git push origin HEAD:${{ github.ref_name }}
