name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      target_commit:
        description: 'The commit SHA to rollback to'
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Perform Rollback
        env:
          TARGET_COMMIT: ${{ inputs.target_commit }}
        run: |
          # Revert the working tree to the target commit state
          git read-tree -um HEAD "$TARGET_COMMIT"

          # Create a new commit with the state of the target commit
          git commit -m "Rollback to commit $TARGET_COMMIT"

          # Push the detached HEAD to the current branch to avoid rewriting history
          git push origin HEAD:${{ github.ref_name }}
