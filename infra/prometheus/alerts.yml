groups:
  - name: API_Alerts
    rules:
      - alert: APIHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx error rate detected"
          description: "API is returning 500s more than 5% of the time over the last 5 minutes."

      - alert: BackendDown
        expr: up{job="borneo-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "Prometheus could not scrape the backend /metrics endpoint for 1 minute."
